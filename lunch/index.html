<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <link rel="apple-touch-icon" href="lunchApp.png">
  <title>Menu Items</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .content-box {
      border: 0px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      background-color: #fff;
      font-size: 30px;
      text-align: center;
    }
    .list-item {
      background-color: #fff;
      border: none;
      padding: 5px;
      margin: 5px;
      list-style-type: none;
    }
    .sub-day-message {
      font-size: 20px;
      margin-top: 10px;
      color: darkorange;
    }
  </style>
</head>
<body>
  <div class="content-box">
    <h1>Today's Lunch is:</h1>
    <b></b><ul id="menuItemsToday"></ul>
    <h2 id="subDayMessage" class="sub-day-message"></h2></b>
    <h1>Tomorrow's Lunch is:</h1>
    <ul id="menuItemsTomorrow"></ul>
    
  </div>

  <script>
    // Helper function to format a given date as "Day MM-D"
    function getFormattedDate(date) {
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const day = dayNames[date.getDay()];
      const month = date.getMonth() + 1; // Months are zero-indexed
      const dayOfMonth = date.getDate();
      return `${day} ${month}-${dayOfMonth}`;
    }

    function displayMenuItems(items, date, contentElementId) {
      const formattedDate = getFormattedDate(date);
      const ul = document.getElementById(contentElementId);
      let itemFound = false;

      items.forEach(item => {
        const regex = new RegExp('^' + formattedDate + '\\s', 'i');
        if (item.title && regex.test(item.title)) {
          const li = document.createElement('li');
          li.className = 'list-item';
          const titleWithoutDate = item.title.replace(regex, '');
          li.textContent = titleWithoutDate.replace(/&amp;/g, '&');

          ul.appendChild(li);
          itemFound = true;

          // Check if the title contains "med"
          const titleLowerCase = item.title.toLowerCase();
          if (titleLowerCase.includes('med')) {
            // Don't check for "bar" if "med" is present
          } else if (titleLowerCase.includes('chicken')) {
            showSubDayMessage(); // Call the function to display the "it's a sub day" message
          } else if (titleLowerCase.includes('bar')) {
            showSubDayMessage(); // Call the function to display the "it's a sub day" message
          }
        }
      });

      if (!itemFound) {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.textContent = "No menu items found for today.";
        ul.appendChild(li);
      }
    }

    function showSubDayMessage() {
      const subDayMessage = document.getElementById('subDayMessage');
      subDayMessage.textContent = "It's a sub day";
    }

    // Immediately invoked function to load menu items
    (function loadMenuItems() {
      const url = "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fbrrice.tandem.co%2Findex.php%3Ftype%3Dexport%26action%3Drss%26export_type%3Dmenus%26date_start%3D2023-11-01%26schools%3D1%26menu_types%3D1&api_key=bqh8acmgmtolhqnfuqqarzfk9pbf6junvw6qjfbs&count=100"; // Use your API URL here
      fetch(url)
        .then(response => response.json())
        .then(jsonData => {
          if (jsonData.items && Array.isArray(jsonData.items)) {
            // Display today's menu items
            displayMenuItems(jsonData.items, new Date(), 'menuItemsToday');
            
            // Display tomorrow's menu items
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            displayMenuItems(jsonData.items, tomorrow, 'menuItemsTomorrow');
          } else {
            document.getElementById('menuItemsToday').textContent = "No menu items found for today.";
            document.getElementById('menuItemsTomorrow').textContent = "No menu items found for tomorrow.";
          }
        })
        .catch(error => {
          console.error('Error fetching JSON:', error);
          document.getElementById('menuItemsToday').textContent = 'There was an issue fetching today\'s menu.';
          document.getElementById('menuItemsTomorrow').textContent = 'There was an issue fetching tomorrow\'s menu.';
        });
    })();
  </script>
</body>
</html>
