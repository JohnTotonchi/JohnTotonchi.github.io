<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes"> 
  <link rel="apple-touch-icon" href="https://cdn1.iconfinder.com/data/icons/heroicons-ui/24/menu-1024.png">
  <title>Menu Items</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .content-box {
      border: 0px solid #ddd;
      padding: 10px;
      margin-top: 10px;
      background-color: #fff;
      font-size: 30px;
      text-align: center;
    }
    .list-item {
      background-color: #fff;
      border: none;
      padding: 5px;
      margin: 5px;
      list-style-type: none; /* Removes bullet points */
    }
  </style>
</head>
<body>
  <div class="content-box">
    <h1>Today's Lunch is:</h1>
    <h3 id="jsonContentToday">Loading today's menu...</h3>
    <h1>Tomorrow's Lunch is:</h1>
    <h3 id="jsonContentTomorrow">Loading tomorrow's menu...</h3>
  </div>

  <script>
    // Helper function to format a given date as "Day MM-D"
    function getFormattedDate(date) {
      const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const day = dayNames[date.getDay()];
      const month = date.getMonth() + 1; // Months are zero-indexed
      const dayOfMonth = date.getDate();
      return `${day} ${month}-${dayOfMonth}`;
    }

    function displayMenuItems(items, date, contentElementId) {
      const formattedDate = getFormattedDate(date);
      const ul = document.createElement('ul');
      let itemFound = false;

      items.forEach(item => {
        const regex = new RegExp('^' + formattedDate + '\\s'); // Include space after the date
        if (item.title && regex.test(item.title)) {
          const li = document.createElement('li');
          li.className = 'list-item';
          // Replace the date in the title with an empty string
          const titleWithoutDate = item.title.replace(regex, '');
          li.textContent = titleWithoutDate.replace(/&amp;/g, '&'); // Replace "&amp;" with "&" in the menu item title

          ul.appendChild(li);
          itemFound = true;
        }
      });

      if (!itemFound) {
        const li = document.createElement('li');
        li.className = 'list-item';
        li.textContent = "No menu items found.";
        ul.appendChild(li);
      }

      const contentElement = document.getElementById(contentElementId);
      contentElement.innerHTML = ''; // Clear loading message or previous content
      contentElement.appendChild(ul); // Add data
    }

    // Immediately invoked function to load menu items
    (function loadMenuItems() {
      const url = "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Fbrrice.tandem.co%2Findex.php%3Ftype%3Dexport%26action%3Drss%26export_type%3Dmenus%26date_start%3D2023-11-01%26schools%3D1%26menu_types%3D1&api_key=bqh8acmgmtolhqnfuqqarzfk9pbf6junvw6qjfbs&count=100"; // Use your API URL here
      fetch(url)
        .then(response => response.json())
        .then(jsonData => {
          if (jsonData.items && Array.isArray(jsonData.items)) {
            // Display today's menu items
            displayMenuItems(jsonData.items, new Date(), 'jsonContentToday');
            // Display tomorrow's menu items
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            displayMenuItems(jsonData.items, tomorrow, 'jsonContentTomorrow');
          } else {
            document.getElementById('jsonContentToday').textContent = "No menu items found.";
            document.getElementById('jsonContentTomorrow').textContent = "No menu items found.";
          }
        })
        .catch(error => {
          console.error('Error fetching JSON:', error);
          document.getElementById('jsonContentToday').textContent = 'There was an issue fetching the menu.';
          document.getElementById('jsonContentTomorrow').textContent = 'There was an issue fetching the menu.';
        });
    })();
  </script>
</body>
</html>
