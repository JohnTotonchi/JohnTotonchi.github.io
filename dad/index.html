<!DOCTYPE html>
<html>
<head>
    <title>Father's Day Card</title>
    <style>
        body {
            background-color: #f1f1f1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        
        .card {
            max-width: 75%;
            max-height: 100%;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            overflow: auto;
            position: relative;
            background-image: linear-gradient(rgba(255, 255, 0, 0.06), rgba(255, 255, 0, 0.06)), url('https://st2.depositphotos.com/1007531/7434/i/600/depositphotos_74344623-stock-photo-seamless-paper-texture.jpg');
            background-repeat: repeat;
            background-size: 400px;
        }
        
        h1 {
            font-size: 5vw;
            margin-bottom: 2vw;
        }
        
        p {
            font-size: 3vw;
            line-height: 1.5;
            margin-bottom: 2vw;
        }
        
        .signature {
            font-size: 2vw;
            text-align: right;
            margin-top: 4vw;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Happy Father's Day!</h1>
        <p>Dear Dad,</p>
        <p>I know this card is not very Gaudi, but I hope you like it.Thanks for taking me to Rome and Italy. I will never forget this trip. I am looking forward to not being paranoid about cars on the sidewalk and pickpockets.</p>
        <p>Love you.</p>
        <p class="signature">-jack</p>
    </div>
</body>
</html>
