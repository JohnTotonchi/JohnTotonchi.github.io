<!DOCTYPE html>
<html>
<head>
    <title>Quadratic Solver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        h1 {
            background-color: #007BFF;
            color: white;
            padding: 20px;
        }

        label {
            display: block;
            margin: 10px 0;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 5px;
            margin: 5px 0;
        }

        button {
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        h2 {
            margin: 20px 0;
        }

        #output, #discriminant {
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <h1>Quadratic Equation Solver</h1>

    <label for="valueA">A:</label><br>
    <input type="number" id="valueA" name="valueA"><br>

    <label for="valueB">B:</label><br>
    <input type="number" id="valueB" name="valueB"><br>

    <label for="valueC">C:</label><br>
    <input type="number" id="valueC" name="valueC"><br>

    <button onclick="calculate()">Calculate</button>

    <h2>Results</h2>
    <div id='output'></div>
    <div id='discriminant'></div>
  
    <script>
        function calculate() {
            var a = document.getElementById('valueA').value;
            var b = document.getElementById('valueB').value;
            var c = document.getElementById('valueC').value;
            
            var output = document.getElementById('output');
            var discriminant = document.getElementById('discriminant');
            
            var d = Math.pow(b, 2) - (4 * a * c);
            
            var sol1, sol2;
            if (d < 0){
                discriminant.innerHTML = 'No real solutions';
                output.innerHTML = '';
            }
            else{
                var sqrt_val = Math.sqrt(Math.abs(d)); 
                sol1 = (-b + sqrt_val) / (2 * a);
                sol2 = (-b - sqrt_val) / (2 * a);
                
                if (sol1 == sol2)
                    discriminant.innerHTML = '1 real solution';
                else
                    discriminant.innerHTML = '2 real solutions';

                output.innerHTML = 'Solutions are: ' + sol1 + ' and ' + sol2;
            }
        }
    </script>
</body>
</html>
