<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, Mom!</title>
<style>
    body, html {
        height: 100%;
        margin: 0;
        display: flex;
        flex-direction: column; /* Adjusted to column for stacking */
        justify-content: center;
        align-items: center;
        background-color: #f3f3f3;
        font-family: Arial, sans-serif;
    }

    .card {
        background-color: #fff; /* Set the base background color */
        padding: 2em;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        max-width: 300px;
        text-align: center;
        background-image: url("https://1.bp.blogspot.com/-JXKLbblO1gE/XVhffYkoXwI/AAAAAAAAMCI/78O7N8u1CtoRRyezIoBDtlDT0rYPt1bbACEwYBhgL/s1600/paper_seamless_dirty_white_texture.jpg");
        background-size: cover;
        background-blend-mode: multiply; /* Blending the background color and the image */
        margin-bottom: 20px; /* Added some margin at the bottom */
    }

    .card h1 {
        color: #E6A6FA;
        margin-bottom: 0.5em;
        /* Create a text outline */
        text-shadow:
          -1px -1px 0 #000,  
           1px -1px 0 #000,
          -1px  1px 0 #000,
           1px  1px 0 #000;
    }

    .card p {
        font-size: 1em;
        line-height: 1.5;
        color: #333;
        margin-top: 0;
    }

    /* Style for the bread image */
    .bread-image {
        max-width: 300px; /* Controls the width of the image */
    }
</style>
</head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Snowstorm/20131208/snowstorm.js" integrity="sha512-N8H1tAcm2/wJx02Q3FznOerQj4sFIdQJpmntt0/7ufMLh8dH1DFf7Zss+lbL7JwtYJuGVV+cVmWOdTA4x2lOTg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<body>

<div class="card">
    <h1>Happy Birthday, Mom!</h1>
    <p>I really appreciate all you do for us and the love (and bread) you give. I am sorry that I am not good at writing cards, but I love you. Thank you for everything.</p>
</div>

<!-- Image container -->
<div class="bread-image">
    <img src="https://pnghq.com/wp-content/uploads/bread-png-high-quality-image-17419.png" alt="Bread image" style="width:100%;"> <!-- Image with 100% width -->
</div>

</body>
</html>
