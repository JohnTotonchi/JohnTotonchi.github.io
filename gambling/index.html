<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette Simulator</title>
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
    body {
        font-family: 'Arial', sans-serif;
        margin: 0;
        padding: 0 10px; /* Margins around the edges */
        background-color: #f5f5f7;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        overflow-x: hidden; /* Prevents horizontal scrolling */
        overflow-y: auto; /* Allows vertical scrolling */
    }
    .container {
        width: 100%;
        max-width: 600px;
        background: #fff;
        padding: 20px;
        margin: 10px;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    input, button {
        width: calc(100% - 26px);
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ccc; /* Border added for clarity */
        border-radius: 5px;
    }
    button {
        background-color: #007aff;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #dddddd;
        text-align: left;
        padding: 8px;
    }
    th {
        background-color: #007aff;
        color: white;
    }
    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
    .profit, .center {
        font-size: 1.5em;
        margin-top: 10px;
        font-weight: bold;
        text-align: center;
    }
    .positive {
        color: green;
    }
    .negative {
        color: red;
    }
    footer {
        width: calc(100% - 20px);
        padding: 10px;
        font-style: italic;
        color: gray;
        display: flex;
        justify-content: space-between;
        font-size: 14px;
    }
</style>
</head>
<body>
<div class="container">
    <h1 class="center">Roulette Wheel Simulation</h1>

    <label for="bankroll">Enter your initial bankroll:</label>
    <input type="number" id="bankroll" value="1000"><br>

    <label for="wager">Enter your initial wager:</label>
    <input type="number" id="wager" value="10"><br>

    <label for="trials">Enter number of trials:</label>
    <input type="number" id="trials" value="100"><br>

    <button onclick="runSimulation()">Run Simulation</button>

    <div id="profitDisplay" class="profit"></div>

    <div id="diagnostics" class="center"></div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Trial #</th>
                <th>Result</th>
                <th>Outcome</th>
                <th>Current Wager</th>
                <th>Current Bankroll</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<footer>
    <div>I made this the day Galli was pissed</div>
    <div>Shoutout Ivan</div>
</footer>

<script>
function runSimulation() {
    const initialBankroll = parseInt(document.getElementById('bankroll').value);
    const initialWager = parseInt(document.getElementById('wager').value);
    const trials = parseInt(document.getElementById('trials').value);
    const tbody = document.querySelector("#resultsTable tbody");
    tbody.innerHTML = "";

    let currentWager = initialWager;
    let currentBankroll = initialBankroll;
    let totalWins = 0;
    let totalLosses = 0;
    let totalRed = 0;
    let totalBlack = 0;
    let totalGreen = 0;

    for (let i = 1; i <= trials && currentBankroll > 0; i++) {
        if (currentWager > currentBankroll) currentWager = currentBankroll;

        const spinResult = spinRoulette();
        if (spinResult === 'Red') totalRed++;
        if (spinResult === 'Black') totalBlack++;
        if (spinResult === 'Green') totalGreen++;

        const won = spinResult === 'Red';
        const outcome = won ? currentWager : -currentWager;
        currentBankroll += outcome;
        won ? totalWins++ : totalLosses++;
        currentWager = won ? initialWager : currentWager * 2;

        const row = `<tr>
            <td>${i}</td>
            <td>${spinResult}</td>
            <td>${outcome >= 0 ? 'Won ' + Math.abs(outcome) : 'Lost ' + Math.abs(outcome)}</td>
            <td>${currentWager}</td>
            <td>${currentBankroll}</td>
        </tr>`;
        tbody.innerHTML += row;
    }

    const totalProfit = currentBankroll - initialBankroll;
    const profitEl = document.getElementById('profitDisplay');
    profitEl.className = 'profit ' + (totalProfit >= 0 ? 'positive' : 'negative');
    profitEl.textContent = 'Total Profit: ' + totalProfit;

    const diagEl = document.getElementById('diagnostics');
    diagEl.innerHTML = `
        <p>Total Wins: ${totalWins}, Total Losses: ${totalLosses}</p>
        <p>Reds: ${totalRed}, Blacks: ${totalBlack}, Greens: ${totalGreen}</p>
        <p>Final Bankroll: ${currentBankroll}</p>`;
}

function spinRoulette() {
    const randomNumber = Math.floor(Math.random() * 38);
    return randomNumber < 18 ? 'Red' : (randomNumber < 36 ? 'Black' : 'Green');
}
</script>
</body>
</html>
