<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBD Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/fmap/style.css">
</head>
<body class="bg-light text-center">
    <div class="container py-4">
        <button id="infoButton" class="btn btn-outline-info position-fixed top-0 end-0 m-2">Info</button>
        
        <div id="infoPopup" class="info-popup shadow rounded">
            <button id="closePopup" class="btn-close position-absolute top-0 end-0 m-2"></button>
            <p class="mt-4">Go to ChatGPT and type...</p>
            <code class="bg-light p-2 d-block text-start rounded">[Instructions]</code>
        </div>

        <button id="darkModeToggle" class="btn btn-secondary mb-4">🌞</button>
        <h1 class="mb-3">Free Body Diagram Maker</h1>

        <div class="controls d-flex justify-content-center mb-4">
            <button id="addForce" class="btn btn-success mx-2">+</button>
            <button id="removeForce" class="btn btn-danger mx-2">-</button>
        </div>

        <input type="text" id="labelInput" class="form-control w-50 mx-auto mb-3" placeholder="Enter map label..." maxlength="50">
        <div id="forcesContainer" class="mb-4"></div>

        <div class="canvas-container mx-auto">
            <canvas id="forceCanvas" class="border rounded"></canvas>
        </div>

        <div class="d-flex justify-content-center mt-4">
            <button id="download" class="btn btn-primary mx-2">Download Image</button>
            <button id="downloadJSON" class="btn btn-primary mx-2">Download JSON</button>
        </div>

        <div class="mt-4">
            <textarea id="jsonInputField" class="form-control mb-3" rows="5" placeholder="Paste JSON here..."></textarea>
            <button id="loadJSONButton" class="btn btn-primary">Load JSON</button>
        </div>

        <footer class="bg-dark text-light py-3 mt-4">
            <p class="mb-1">Contact me at: <a href="mailto:jack.totonchi@gmail.com" class="text-light">jack.totonchi@gmail.com</a></p>
        </footer>
    </div>
    <script src="/fmap/script.js"></script>
</body>
