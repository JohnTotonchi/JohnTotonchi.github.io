    <title>Force Map Maker</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: white; /* Light mode default */
            color: black; /* Text color */
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            background-color: #121212;
            color: white;
        }

        .dark-mode canvas {
            background-color: #222;
        }

        .dark-mode input {
            background-color: #333;
            color: white;
            border-color: #444;
        }

        .dark-mode button {
            background-color: #444;
            color: white;
            border-color: #555;
        }

        .controls, .force-input, .canvas-container, button, input {
            max-width: 100%;
        }

        .controls {
            margin-bottom: 10px;
        }

        .force-input {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .force-input input[type="range"] {
            width: 100px;
        }

        .force-input input {
            font-size: 16px;
            padding: 5px;
        }

        .force-input input[type="number"] {
            text-align: center;
        }

        .force-input span {
            font-size: 14px;
        }

        .force-input button {
            font-size: 16px;
            padding: 5px 10px;
            cursor: pointer;
        }

        button {
            font-size: 18px;
            padding: 10px;
            margin: 5px;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 400px;
            max-height: 400px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            background-color: white;
            transition: background-color 0.3s;
        }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background-color: black;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        input[type="text"]#labelInput {
            width: 80%;
            font-size: 16px;
            padding: 5px;
            margin-bottom: 15px;
        }

        #darkModeToggle {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
        }

        #jsonInputField {
            width: 90%;
            height: 100px;
            padding: 5px;
            margin-top: 15px;
            font-size: 14px;
            font-family: monospace;
            border: 1px solid #ddd;
        }

        #loadJSONButton {
            margin-top: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <button id="darkModeToggle">🌞</button>
    <h1 style="font-size: 1.5em; margin-bottom: 10px;">Force Map Maker</h1>
    <div class="controls">
        <button id="addForce">+</button>
        <button id="removeForce">-</button>
        <br>
        <input type="text" id="labelInput" placeholder="Enter map label..." maxlength="50">
    </div>
    <div id="forcesContainer"></div>
    <div class="canvas-container">
        <div class="center-dot"></div>
        <canvas id="forceCanvas" width="400" height="400"></canvas>
    </div>
    <button id="download">Download Image</button>
    <button id="downloadJSON">Download JSON</button>
    <input type="file" id="uploadJSON" style="display: none;" accept=".json">

    <div>
        <textarea id="jsonInputField" placeholder="Paste JSON here..."></textarea>
        <button id="loadJSONButton">Load JSON</button>
    </div>

    <script>
        const canvas = document.getElementById("forceCanvas");
        const ctx = canvas.getContext("2d");
        const forcesContainer = document.getElementById("forcesContainer");
        const addForceButton = document.getElementById("addForce");
        const removeForceButton = document.getElementById("removeForce");
        const labelInput = document.getElementById("labelInput");
        const downloadButton = document.getElementById("download");
        const downloadJSONButton = document.getElementById("downloadJSON");
        const uploadJSONInput = document.getElementById("uploadJSON");
        const darkModeToggle = document.getElementById("darkModeToggle");
        const jsonInputField = document.getElementById("jsonInputField");
        const loadJSONButton = document.getElementById("loadJSONButton");
        const center = { x: canvas.width / 2, y: canvas.height / 2 };
        const arrowSize = 10;
        let forces = [];
        let isDarkMode = false;

        function drawArrowhead(fromX, fromY, toX, toY) {
            const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - arrowSize * Math.cos(angle - Math.PI / 6), toY - arrowSize * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - arrowSize * Math.cos(angle + Math.PI / 6), toY - arrowSize * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = "black";
            ctx.fill();
        }

        function drawForces() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const labelText = labelInput.value.trim();
            if (labelText) {
                ctx.font = "20px Arial";
                ctx.textAlign = "center";
                ctx.fillText(labelText, center.x, 20);
            }

            forces.forEach(({ length, angle, label }) => {
                const radians = (angle * Math.PI) / 180;
                const endX = center.x + length * 30 * Math.cos(radians);
                const endY = center.y - length * 30 * Math.sin(radians);

                ctx.beginPath();
                ctx.moveTo(center.x, center.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = "black";
                ctx.stroke();

                drawArrowhead(center.x + length * 30 * 0.95 * Math.cos(radians), center.y - length * 30 * 0.95 * Math.sin(radians), endX, endY);

                const labelX = center.x + (length * 30 + 15) * Math.cos(radians);
                const labelY = center.y - (length * 30 + 15) * Math.sin(radians);
                ctx.font = "bold 14px Arial";
                ctx.fillText("F", labelX, labelY);
                ctx.font = "10px Arial";
                ctx.fillText(label, labelX + 8, labelY + 4);
            });
        }

        function renderForceInputs() {
            forcesContainer.innerHTML = "";
            forces.forEach((force, i) => {
                const div = document.createElement("div");
                div.className = "force-input";
                div.innerHTML = `
                    <input type="number" min="1" max="10" step="0.1" value="${force.length}">
                    <input type="range" min="0" max="360" step="15" value="${force.angle}">
                    <span>${force.angle}°</span>
                    <input type="text" value="${force.label}" maxlength="3">
                `;
                div.querySelectorAll("input").forEach((input, idx) => {
                    input.addEventListener("input", () => {
                        if (idx === 0) force.length = parseFloat(input.value);
                        if (idx === 1) {
                            force.angle = parseInt(input.value);
                            div.querySelector("span").textContent = `${force.angle}°`;
                        }
                        if (idx === 2) {
                            force.label = input.value;
                        }
                        drawForces();
                    });
                });
                forcesContainer.appendChild(div);
            });
        }

        addForceButton.addEventListener("click", () => {
            forces.push({ length: 2, angle: 0, label: "F" });
            renderForceInputs();
            drawForces();
        });

        removeForceButton.addEventListener("click", () => {
            if (forces.length > 0) {
                forces.pop();
                renderForceInputs();
                drawForces();
            }
        });

        downloadButton.addEventListener("click", () => {
            const dataURL = canvas.toDataURL("image/png");
            const link = document.createElement("a");
            link.href = dataURL;
            link.download = "force-map.png";
            link.click();
        });

        downloadJSONButton.addEventListener("click", () => {
            const blob = new Blob([JSON.stringify(forces)], { type: "application/json" });
            const link = document.createElement("a");
            link.download = "forces.json";
            link.href = URL.createObjectURL(blob);
            link.click();
        });

        uploadJSONInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file && file.type === "application/json") {
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const json = JSON.parse(reader.result);
                        forces = json;
                        renderForceInputs();
                        drawForces();
                    } catch (error) {
                        alert("Failed to load JSON");
                    }
                };
                reader.readAsText(file);
            } else {
                alert("Please upload a valid JSON file.");
            }
        });

        labelInput.addEventListener("input", drawForces);

        darkModeToggle.addEventListener("click", () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle("dark-mode", isDarkMode);
            darkModeToggle.textContent = isDarkMode ? "🌙" : "🌞";
            drawForces();
        });

        loadJSONButton.addEventListener("click", () => {
            try {
                const jsonData = JSON.parse(jsonInputField.value);
                forces = jsonData;
                renderForceInputs();
                drawForces();
            } catch (error) {
                alert("Invalid JSON format.");
            }
        });

        drawForces();
    </script>


</body>
