<!DOCTYPE html>
<html>
<head>
  <title>DALL·E Generator</title>
  <style>
    /* Add your CSS here */
  </style>
</head>
<body>
  <form id="myForm">
    <label for="apiKey">API Key:</label><br>
    <input type="text" id="apiKey" name="apiKey"><br>
    <label for="model">Model:</label><br>
    <select id="model" name="model">
      <option value="dall-e-2">DALL·E 2</option>
      <option value="dall-e-3">DALL·E 3</option>
    </select><br>
    <label for="prompt">Prompt:</label><br>
    <input type="text" id="prompt" name="prompt"><br>
    <label for="n">Number of Images:</label><br>
    <input type="number" id="n" name="n" min="1" max="10"><br>
    <input type="submit" value="Submit">
  </form>
  <img id="responseImg" src="" alt="Generated Image">

  <script>
    document.getElementById('myForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const apiKey = document.getElementById('apiKey').value;
      const model = document.getElementById('model').value;
      const prompt = document.getElementById('prompt').value;
      const n = document.getElementById('n').value;
      const headers = {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      };

      const body = {
        model: model,
        prompt: prompt,
        n: n,
        size: "1024x1024"
      };

      fetch('https://api.openai.com/v1/images/generations', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(body)
      })
      .then(response => response.json())
      .then(data => document.getElementById("responseImg").src = data.result.images[0].result)
      .catch((error) => console.error('Error:', error));
    });
  </script>
</body>
</html>
